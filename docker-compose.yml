services:
  postgres:
    image: postgres:15
    container_name: job-agent-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 0224
      services:
  postgres:
    image: postgres:15
    container_name: job-agent-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 0224
      POSTGRES_DB: jobagent
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: job-agent-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: job-agent-api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:0224@postgres:5432/jobagent
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app

  celery:
    build: .
    container_name: job-agent-celery
    command: celery -A app.core.celery_app worker --loglevel=info --pool=solo
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:0224@postgres:5432/jobagent
      REDIS_URL: redis://redis:6379/0POSTGRES_DB: jobagent
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: job-agent-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:

flower:
    build: .
    container_name: job-agent-flower
    command: celery -A app.core.celery_app flower --port=5555
    ports:
      - "5555:5555"
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      - redis
    volumes:
      - .:/app